spring:
  datasource:
    url: jdbc:h2:mem:health_manager_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: false
  sql:
    init:
      mode: never

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: TestOnlyJwtSecretKeyWithAtLeastThirtyTwoBytes2026
  expiration: 3600000

ai:
  api-url: http://localhost/unused
  api-key: test-only
  model: test-model
