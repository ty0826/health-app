name: CI

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
          cache: maven
      - name: Run backend tests
        working-directory: backend
        run: mvn -B test

  frontend-web:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22.22.0
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install frozen dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Run frontend tests
        working-directory: frontend
        run: pnpm test
      - name: Run TypeScript checks
        working-directory: frontend
        run: pnpm run typecheck
      - name: Build WeChat Mini Program
        working-directory: frontend
        run: pnpm run build:weapp
      - name: Build H5
        working-directory: frontend
        run: pnpm run build:h5

  frontend-native:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22.22.0
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install frozen dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Build React Native bundle
        working-directory: frontend
        run: pnpm run build:rn
      - name: Validate Expo configuration
        working-directory: frontend
        run: pnpm exec expo config --type public
      - name: Check Expo dependencies
        working-directory: frontend
        run: pnpm exec expo install --check

  compose-config:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      MYSQL_PASSWORD: ci-database-password
      MYSQL_ROOT_PASSWORD: ci-root-password
      JWT_SECRET: ci-only-jwt-secret-with-more-than-thirty-two-bytes
      AI_API_URL: https://api.openai.com/v1/chat/completions
      AI_API_KEY: ci-placeholder-key
      AI_MODEL: gpt-4.1-mini
    steps:
      - uses: actions/checkout@v4
      - name: Validate Docker Compose configuration
        run: docker compose config --quiet
